<section id="configuration-user-screen" class="section">
  <div class="flex flex-col w-full p-6 gap-6">
    <div>
      <h1 class="text-4xl">Configuración</h1>
    </div>
    <div class="flex flex-col gap-2">
      <h2 class="text-2xl">Datos del usuario</h2>
      <form>
        <div class="flex flex-col gap-3 bg-[#1E293B] rounded-xl p-6">
          <label for="username">Nombre del usuario</label>
          <input type="text" class="input rounded-xl p-2" />
          <label for="password">Contraseña</label>
          <input type="password" class="input rounded-xl p-2" />
          <label for="country-selected">Pais seleccionado</label>
          <select name="country-selected" id="country-selected" class="input rounded-xl p-2">
            @for (country of countries; track $index) {
              <option value="country.code">{{ country.name }} {{ country.flag }}</option>
            }
          </select>
          <button class="button">Guardar cambios</button>
        </div>
      </form>
    </div>
  </div>
</section>
